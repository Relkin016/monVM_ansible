- name: Allow incoming traffic for Nginx
  community.general.ufw:
    rule: allow
    port:
      - "{{ http_port }}"
      - "{{ https_port }}"
    proto: tcp
  notify: Enable UFW
  listen: UFW Nginx

- name: Allow incoming traffic for MySQL
  community.general.ufw:
    rule: allow
    port: 3306
    proto: tcp
    comment: "Allow port for MySQL"
  notify: Enable UFW
  listen: UFW MySQL

- name: Enable UFW
  community.general.ufw:
      state: enabled
  listen: Enable UFW
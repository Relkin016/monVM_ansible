- name: Allow incoming traffic for Nginx
  community.general.ufw:
    rule: allow
    port:
      - 80
      - 443
    proto: tcp
  notify: Enable UFW
  listen: UFW Nginx

- name: Allow incoming traffic on port 3306 for TCP
  community.general.ufw:
    rule: allow
    port: 3306
    proto: tcp
    comment: "Allow port for MySQL"
  notify: Enable UFW
  listen: UFW MySQL

- name: Enable UFW
  community.general.ufw:
      state: enabled
  listen: Enable UFW
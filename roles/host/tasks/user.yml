- name: Create New Group
  group:
    name: "{{ new_user }}"
    state: present

- name: Create new usr
  user:
    name: "{{ new_user }}"
    group: "{{ new_user }}"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Setup sudo config
  copy:
    content: "{{ new_user }} ALL=(ALL) NOPASSWD:ALL"
    dest: "/etc/sudoers.d/{{ new_user }}"
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'

- name: Add authorized keys
  ansible.posix.authorized_key:
    user: "{{ new_user }}"
    state: present
    key: "{{ lookup('file', item) }}"
  loop:
    - yubikey_piv.pub
    - "{{ ssh_key | default('~/.ssh/id_rsa.pub') }}"
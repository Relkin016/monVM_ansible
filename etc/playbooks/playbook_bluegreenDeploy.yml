- hosts: all
  gather_facts: false
  become: yes

  pre_tasks:
    - name: "Try users in order: relkin -> ansible -> bootstrap"
      ansible.builtin.wait_for_connection:
        timeout: 3
      ignore_errors: true
      register: auth_results
      loop:
        - relkin
        - ansible
        - "{{ bootstrap_user | default('root') }}"
      loop_control:
        loop_var: try_user
      vars:
        ansible_user: "{{ try_user }}"
      when: found_user_name is not defined or found_user_name == ""

    - name: "Set the first successful user as ansible_user"
      ansible.builtin.set_fact:
        ansible_user: "{{ item.try_user }}"
        found_user_name: "{{ item.try_user }}"
      loop: "{{ auth_results.results }}"
      # Фильтруем только тот результат, который не провалился
      when:
        - item.failed is not defined or not item.failed
        - item.skipped is not defined or not item.skipped
        - found_user_name is not defined

    - name: "Fail if no users could connect"
      ansible.builtin.fail:
        msg: "Could not connect with any of the attempted users."
      when: found_user_name is not defined

    - name: "Now gather facts with: {{ ansible_user }}"
      ansible.builtin.setup:

  roles:
    - host
    - sharedApps